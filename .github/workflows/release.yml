name: Release

# App-mode release pipeline (Paddock is an app, not published npm libraries):
#   1. On push to main, changesets maintains a "Version Packages" PR that bumps
#      the app version (@paddock/server + @paddock/web are `fixed`, so they move
#      together) and updates CHANGELOG.md.
#   2. When that PR is merged, no changesets remain, the app version has changed,
#      and no v<version> tag exists yet → the `artifacts` job builds & publishes:
#        - the multi-arch Docker image  ghcr.io/edspencer/paddock:<version> + :latest
#        - a self-contained release tarball attached to a GitHub Release v<version>
#
# Both jobs run in the SAME workflow run (the push that merges the version PR),
# so we never rely on GITHUB_TOKEN pushing a tag to trigger a second workflow
# (which GitHub blocks).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR / detect release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Opens/updates the "Version Packages" PR while changesets are present.
      # No `publish:` — the packages are private; we never npm-publish.
      - name: Changesets version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # After a version PR merges there are no changesets left. If the current
      # app version has no v<version> tag yet, this is a fresh release.
      - name: Detect release
        id: detect
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION="$(node -p "require('./packages/server/package.json').version")"
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "v${VERSION} already released — nothing to do"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "new release: v${VERSION}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # Build each (target × arch) on a NATIVE runner (amd64 on x86, arm64 on
  # GitHub's free arm runners) instead of emulating arm64 under QEMU on one x86
  # runner — emulation made this step take ~9-10 min; native runners take
  # ~1-2 min each, in parallel. Each leg pushes by digest; `artifacts` merges
  # one manifest per target (base + devbox). The cross-product of `target` and
  # `platform` is 4 legs; the `include` entries attach arch+runner to every
  # combination that shares their `platform`.
  build-image:
    name: Build image (${{ matrix.target }} · ${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [base, devbox]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/edspencer/paddock,push-by-digest=true,name-canonical=true,push=true
          # Separate cache scope per target: base and devbox share the build +
          # base layers, but devbox stacks the heavy browser layer on top.
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  artifacts:
    name: Publish image + tarball + release
    needs: [release, build-image]
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
      packages: write # push the merged manifest to GHCR
    env:
      VERSION: ${{ needs.release.outputs.version }}
      IMAGE: ghcr.io/edspencer/paddock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (server + web)
        run: npm run build

      # ---- release tarball ----
      - name: Build tarball
        run: bash scripts/make-tarball.sh

      # ---- assemble one multi-arch manifest per target from per-arch digests ----
      # Keep each artifact in its own subdir (no merge-multiple) so the base and
      # devbox digests stay separable: digests-<target>-<arch>/<digest>.
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # base   → :<version> + :latest
      # devbox → :<version>-devbox + :devbox
      - name: Tag multi-arch images
        run: |
          set -euo pipefail
          # Each build leg uploaded ONE digest file per (target, arch), living at
          # /tmp/digests/digests-<target>-<arch>/<digest-hex> (named by the digest,
          # no `sha256:` prefix). Iterate the files directly and basename each —
          # `ls` on multiple dirs emits `dirname:` header lines that would corrupt
          # the reference list (that was the release-tag failure this fixes).
          base_digests=""
          for f in /tmp/digests/digests-base-*/*; do
            base_digests="${base_digests} ${IMAGE}@sha256:$(basename "$f")"
          done
          devbox_digests=""
          for f in /tmp/digests/digests-devbox-*/*; do
            devbox_digests="${devbox_digests} ${IMAGE}@sha256:$(basename "$f")"
          done

          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            ${base_digests}

          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}-devbox" \
            -t "${IMAGE}:devbox" \
            ${devbox_digests}

      - name: Inspect images
        run: |
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}-devbox"

      # ---- GitHub Release (creates the v<version> tag at this SHA) ----
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "paddock-${VERSION}.tgz" \
            "paddock-${VERSION}.tgz.sha256"
