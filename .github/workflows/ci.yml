name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + Unit/Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Server (unit + integration, incl. the real FleetManager + fake-claude
      # harness) and web (component + transport) — all with zero Anthropic calls.
      - name: Unit + integration tests
        run: npm test

  e2e:
    name: E2E (Playwright, fake-claude)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build web + server
        run: npm run build
      # Drives the built SPA against the real server + fake-claude binary across
      # a standard + a git-enabled Playwright server (no Anthropic calls).
      - name: Browser E2E journeys
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
