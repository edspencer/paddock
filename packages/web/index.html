<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the saved theme before first paint (no flash). Defaults to dark;
         the in-app toggle (issue #23) persists `paddock:theme` in localStorage. -->
    <script>
      (function () {
        try {
          document.documentElement.classList.toggle(
            "dark",
            localStorage.getItem("paddock:theme") !== "light",
          );
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <!-- viewport-fit=cover lets the layout extend under the notch / home
         indicator; the app pads its edge chrome back with env(safe-area-inset-*).
         We deliberately DO NOT set maximum-scale/user-scalable=no — the
         focus-zoom is prevented by 16px form controls (see index.css), which
         keeps pinch-to-zoom working for accessibility. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141210" />
    <title>Paddock</title>
    <meta
      name="description"
      content="Project-first launchpad for server-hosted, persistent Claude Code sessions."
    />
    <!-- PWA (issue #199): installable web app. The manifest + service worker
         (registered in src/lib/pwa.ts) enable Add-to-Home-Screen + standalone
         launch. iOS honors the apple-* tags below (it ignores the manifest's
         display/icons), so they're duplicated here for a chrome-less launch and
         the home-screen icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Favicons (browser tab). /favicon.ico covers the browser's implicit
         bare request; the PNGs are the crisp 16/32 tab icons. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paddock" />
    <!-- Fonts are self-hosted via @font-face in src/index.css (offline-safe,
         no runtime Google Fonts request). Preload the primary UI font. -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
